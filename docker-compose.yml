version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: btriad_app
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: btriad_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: btriad_mysql
    environment:
      MYSQL_DATABASE: btriad
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
